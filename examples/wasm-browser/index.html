<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Generate Greek Key (Meander) border patterns in your browser. Runs fully client-side via WebAssembly — no server needed.">
    <title>Greek Meander — Browser Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f5f2;
        color: #1d1b18;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        gap: 20px;
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 650;
      }

      button,
      select,
      input {
        border: 1px solid #817869;
        border-radius: 6px;
        background: #ffffff;
        color: #1d1b18;
        padding: 8px 12px;
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(6, minmax(120px, 1fr));
        gap: 12px;
        align-items: end;
        padding: 16px;
        border: 1px solid #d6d0c5;
        border-radius: 8px;
        background: #ffffff;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.85rem;
        color: #4c463e;
      }

      label span {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      output {
        color: #1d1b18;
        font-variant-numeric: tabular-nums;
      }

      input[type="range"] {
        width: 100%;
        padding-inline: 0;
      }

      input[type="color"] {
        min-height: 42px;
        padding: 4px;
      }

      input:disabled {
        opacity: 0.55;
      }

      .toggle-label {
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 8px;
      }

      .toggle-label input {
        width: 18px;
        height: 18px;
        padding: 0;
      }

      .output {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0;
        padding: 16px;
        border: 1px solid #d6d0c5;
        border-radius: 8px;
        background: #ffffff;
      }

      figcaption {
        margin-bottom: 12px;
        font-weight: 650;
      }

      .svg-host {
        overflow: auto;
      }

      .svg-host svg {
        display: block;
        width: 100%;
        height: auto;
      }

      #status {
        min-height: 1.4em;
        color: #5f564b;
      }

      @media (max-width: 840px) {
        .controls {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        main {
          padding: 20px;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }

      .tagline {
        margin: 4px 0 0;
        font-size: 0.85rem;
        color: #5f564b;
      }

      .tagline a {
        color: inherit;
      }

      .download-row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        justify-content: flex-end;
      }

      .btn-sm {
        padding: 4px 10px;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="toolbar">
        <div>
          <h1>Greek Meander</h1>
          <p class="tagline">Greek Key border patterns — generated in the browser via WebAssembly.<br>
            <a href="https://github.com/bingqiao/meander" target="_blank" rel="noopener">GitHub</a> ·
            <a href="https://crates.io/crates/greek-meander" target="_blank" rel="noopener">crates.io</a>
          </p>
        </div>
        <button id="reset" type="button">Reset</button>
      </div>
      <form class="controls" id="controls">
        <label>
          Rect color
          <input id="rect-color" type="color" value="#0F5D7C">
        </label>
        <label>
          Ellipse color
          <input id="ellipse-color" type="color" value="#B15E2B">
        </label>
        <label>
          <span>Stroke <output id="stroke-value">2.5</output></span>
          <input id="stroke" type="range" min="1.5" max="5" value="2.5" step="0.5">
        </label>
        <label>
          <span>Opacity <output id="opacity-value">0.9</output></span>
          <input id="opacity" type="range" min="0.45" max="1" value="0.9" step="0.05">
        </label>
        <label class="toggle-label">
          <input id="use-fill" type="checkbox">
          Fill
        </label>
        <label>
          Fill color
          <input id="fill-color" type="color" value="#DCEFF4">
        </label>
        <label class="toggle-label">
          <input id="use-background" type="checkbox">
          Background
        </label>
        <label>
          Background color
          <input id="background-color" type="color" value="#182026">
        </label>
        <label>
          Dash
          <select id="stroke-dash">
            <option value="">Solid</option>
            <option value="10,5">Long dash</option>
            <option value="5,3">Short dash</option>
            <option value="2,4">Dotted</option>
          </select>
        </label>
        <label>
          <span>Rect width <output id="rect-width-value">12</output></span>
          <input id="rect-width" type="range" min="4" max="18" value="12" step="1">
        </label>
        <label>
          <span>Rect height <output id="rect-height-value">7</output></span>
          <input id="rect-height" type="range" min="4" max="18" value="7" step="1">
        </label>
        <label>
          <span>Ellipse rx <output id="ellipse-rx-value">200</output></span>
          <input id="ellipse-rx" type="range" min="80" max="280" value="200" step="10">
        </label>
        <label>
          <span>Ellipse ry <output id="ellipse-ry-value">160</output></span>
          <input id="ellipse-ry" type="range" min="80" max="280" value="160" step="10">
        </label>
        <label>
          <span>Ellipse count <output id="ellipse-count-value">24</output></span>
          <input id="ellipse-count" type="range" min="16" max="40" value="24" step="2">
        </label>
      </form>
      <div id="status">Loading WASM...</div>
      <section class="output" aria-label="Generated SVG output">
        <figure>
          <figcaption>Rectangle</figcaption>
          <div id="rect-output" class="svg-host"></div>
          <div class="download-row">
            <button id="dl-rect-svg" class="btn-sm" type="button">&#8595; SVG</button>
            <button id="dl-rect-png" class="btn-sm" type="button">&#8595; PNG</button>
          </div>
        </figure>
        <figure>
          <figcaption>Ellipse</figcaption>
          <div id="ellipse-output" class="svg-host"></div>
          <div class="download-row">
            <button id="dl-ellipse-svg" class="btn-sm" type="button">&#8595; SVG</button>
            <button id="dl-ellipse-png" class="btn-sm" type="button">&#8595; PNG</button>
          </div>
        </figure>
      </section>
    </main>
    <noscript>
      <p style="text-align:center;padding:32px;color:#5f564b;">JavaScript is required to run this demo.</p>
    </noscript>

    <script type="module">
      import init, { ellipse_generate_svg, rect_generate_svg } from "./pkg/greek_meander.js";

      const status = document.querySelector("#status");
      const rectOutput = document.querySelector("#rect-output");
      const ellipseOutput = document.querySelector("#ellipse-output");
      const controls = document.querySelector("#controls");
      const reset = document.querySelector("#reset");
      const rectColorInput = document.querySelector("#rect-color");
      const ellipseColorInput = document.querySelector("#ellipse-color");
      const stroke = document.querySelector("#stroke");
      const opacity = document.querySelector("#opacity");
      const useFill = document.querySelector("#use-fill");
      const fillColor = document.querySelector("#fill-color");
      const useBackground = document.querySelector("#use-background");
      const backgroundColor = document.querySelector("#background-color");
      const strokeDash = document.querySelector("#stroke-dash");
      const rectWidth = document.querySelector("#rect-width");
      const rectHeight = document.querySelector("#rect-height");
      const ellipseRx = document.querySelector("#ellipse-rx");
      const ellipseRy = document.querySelector("#ellipse-ry");
      const ellipseCount = document.querySelector("#ellipse-count");
      const strokeValue = document.querySelector("#stroke-value");
      const opacityValue = document.querySelector("#opacity-value");
      const rectWidthValue = document.querySelector("#rect-width-value");
      const rectHeightValue = document.querySelector("#rect-height-value");
      const ellipseRxValue = document.querySelector("#ellipse-rx-value");
      const ellipseRyValue = document.querySelector("#ellipse-ry-value");
      const ellipseCountValue = document.querySelector("#ellipse-count-value");

      const defaults = {
        rectColor: "#0F5D7C",
        ellipseColor: "#B15E2B",
        stroke: "2.5",
        opacity: "0.9",
        useFill: false,
        fillColor: "#DCEFF4",
        useBackground: false,
        backgroundColor: "#182026",
        strokeDash: "",
        rectWidth: "12",
        rectHeight: "7",
        ellipseRx: "200",
        ellipseRy: "160",
        ellipseCount: "24",
      };

      let lastRectSvg = "";
      let lastEllipseSvg = "";

      function numberValue(input) {
        return Number.parseFloat(input.value);
      }

      function render() {
        const strokeWidth = numberValue(stroke);
        const strokeOpacity = numberValue(opacity);
        const width = Number.parseInt(rectWidth.value, 10);
        const height = Number.parseInt(rectHeight.value, 10);
        const rxVal = numberValue(ellipseRx);
        const ryVal = numberValue(ellipseRy);
        const eCount = Number.parseInt(ellipseCount.value, 10);
        const fill = useFill.checked ? fillColor.value : null;
        const background = useBackground.checked ? backgroundColor.value : null;
        const dash = strokeDash.value || null;

        fillColor.disabled = !useFill.checked;
        backgroundColor.disabled = !useBackground.checked;

        strokeValue.value = strokeWidth.toFixed(1);
        opacityValue.value = strokeOpacity.toFixed(2);
        rectWidthValue.value = width.toString();
        rectHeightValue.value = height.toString();
        ellipseRxValue.value = rxVal.toString();
        ellipseRyValue.value = ryVal.toString();
        ellipseCountValue.value = eCount.toString();

        lastRectSvg = rect_generate_svg(
          18,
          width,
          height,
          8,
          strokeWidth,
          rectColorInput.value,
          strokeOpacity,
          fill,
          background,
          dash,
        );
        rectOutput.innerHTML = lastRectSvg;

        lastEllipseSvg = ellipse_generate_svg(
          rxVal,
          ryVal,
          eCount,
          8,
          strokeWidth,
          ellipseColorInput.value,
          strokeOpacity,
          fill,
          background,
          dash,
        );
        ellipseOutput.innerHTML = lastEllipseSvg;

        status.textContent = "Generated SVG in the browser via WebAssembly.";
      }

      function resetControls() {
        rectColorInput.value = defaults.rectColor;
        ellipseColorInput.value = defaults.ellipseColor;
        stroke.value = defaults.stroke;
        opacity.value = defaults.opacity;
        useFill.checked = defaults.useFill;
        fillColor.value = defaults.fillColor;
        useBackground.checked = defaults.useBackground;
        backgroundColor.value = defaults.backgroundColor;
        strokeDash.value = defaults.strokeDash;
        rectWidth.value = defaults.rectWidth;
        rectHeight.value = defaults.rectHeight;
        ellipseRx.value = defaults.ellipseRx;
        ellipseRy.value = defaults.ellipseRy;
        ellipseCount.value = defaults.ellipseCount;
        render();
      }

      function downloadAsSvg(svgString, filename) {
        const blob = new Blob([svgString], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      }

      async function downloadAsPng(svgString, filename) {
        const m = svgString.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
        const svgW = m ? parseFloat(m[1]) : 800;
        const svgH = m ? parseFloat(m[2]) : 600;
        const scale = 2;
        const canvas = document.createElement("canvas");
        canvas.width = svgW * scale;
        canvas.height = svgH * scale;
        const ctx = canvas.getContext("2d");
        const blob = new Blob([svgString], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = url; });
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);
        const pngBlob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        const a = document.createElement("a");
        a.href = URL.createObjectURL(pngBlob);
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      }

      try {
        await init();
        render();
        controls.addEventListener("input", render);
        reset.addEventListener("click", resetControls);
        document.querySelector("#dl-rect-svg").addEventListener("click", () => downloadAsSvg(lastRectSvg, "meander_rect.svg"));
        document.querySelector("#dl-rect-png").addEventListener("click", () => downloadAsPng(lastRectSvg, "meander_rect.png"));
        document.querySelector("#dl-ellipse-svg").addEventListener("click", () => downloadAsSvg(lastEllipseSvg, "meander_ellipse.svg"));
        document.querySelector("#dl-ellipse-png").addEventListener("click", () => downloadAsPng(lastEllipseSvg, "meander_ellipse.png"));
      } catch (error) {
        status.textContent = error instanceof Error ? error.message : String(error);
        throw error;
      }
    </script>
  </body>
</html>
